<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>OB Calc</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    /* Input section */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tower-header {
      font-weight: 700;
      text-align: center;
      padding: 7px;
      border-radius: 8px;
      color: white;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .tower-header.t1 { background: #2563eb; }
    .tower-header.t2 { background: #dc2626; }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .input-field label {
      font-size: 0.75rem;
      color: #888;
    }

    .input-field input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      transition: border-color 0.15s;
    }

    .input-field input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .time-field label {
      font-size: 0.75rem;
      color: #888;
    }

    .time-field input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      transition: border-color 0.15s;
    }

    .time-field input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.8rem;
      min-height: 1.2em;
      margin-top: 4px;
    }

    /* Materials section */
    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .material-card {
      border: 1.5px solid #eee;
      border-radius: 10px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .material-card img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .material-name {
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }

    .material-price {
      font-size: 0.72rem;
      color: #aaa;
    }

    .piece-toggles {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 2px;
    }

    .piece-label {
      font-size: 0.68rem;
      color: #bbb;
      text-align: left;
    }

    .piece-toggle {
      display: flex;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .piece-toggle button {
      flex: 1;
      padding: 7px 2px;
      border: none;
      background: #f5f5f5;
      color: #aaa;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      transition: background 0.12s, color 0.12s;
    }

    .piece-toggle button + button {
      border-left: 1px solid #e0e0e0;
    }

    .piece-toggle button.active-t1   { background: #2563eb; color: white; }
    .piece-toggle button.active-none { background: #9ca3af; color: white; }
    .piece-toggle button.active-t2   { background: #dc2626; color: white; }

    /* Results section */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .result-col-header {
      font-weight: 700;
      text-align: center;
      padding: 7px;
      border-radius: 8px;
      color: white;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .result-col-header.t1 { background: #2563eb; }
    .result-col-header.t2 { background: #dc2626; }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #f2f2f2;
      font-size: 0.82rem;
    }

    .result-row .lbl { color: #999; }
    .result-row .val { font-weight: 600; }

    .result-profit {
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .result-profit.positive { background: #dcfce7; color: #16a34a; }
    .result-profit.negative { background: #fee2e2; color: #dc2626; }
    .result-profit.neutral  { background: #f3f4f6; color: #9ca3af; }

    /* Reset */
    .reset-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #6b7280;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .reset-btn:active { opacity: 0.75; }
  </style>
</head>
<body>
  <header>OB Calc</header>
  <main>

    <section>
      <h2 id="sectionInput">見積入力</h2>
      <div class="input-grid">
        <div>
          <div class="tower-header t1" id="towerHeader1">タワー α</div>
          <div class="input-field">
            <label id="heightLabel">見積高さ（cm）</label>
            <input type="number" id="height1" min="10" max="55" placeholder="10〜55">
          </div>
        </div>
        <div>
          <div class="tower-header t2" id="towerHeader2">タワー β</div>
          <div class="input-field">
            <label　id="heightLabel">見積高さ（cm）</label>
            <input type="number" id="height2" min="10" max="55" placeholder="10〜55">
          </div>
        </div>
      </div>
      <div class="time-field">
        <label　id="timeLabel">提出残り時間（分）</label>
        <input type="number" id="time" min="0" max="15" placeholder="0〜15">
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </section>

    <section>
      <h2 id="sectionMaterial">使用資材</h2>
      <div class="materials-grid" id="materialsGrid"></div>
    </section>

    <section>
      <h2 id="sectionResult">計算結果</h2>
      <div class="results-grid">
        <div>
          <div class="result-col-header t1" id="towerHeader1">タワー α</div>
          <div class="result-row"><span class="lbl" id="reward">見積報酬</span><span class="val" id="reward1">—</span></div>
          <div class="result-row"><span class="lbl" id="multiplier">倍率</span><span class="val" id="multiplier1">—</span></div>
          <div class="result-row"><span class="lbl" id="sales">見積売上</span><span class="val" id="sales1">—</span></div>
          <div class="result-row"><span class="lbl" id="purchase">購入額</span><span class="val" id="purchase1">—</span></div>
          <div class="result-profit neutral" id="profit1" id="profit">利益: —</div>
        </div>
        <div>
          <div class="result-col-header t2" id="towerHeader2">タワー β</div>
          <div class="result-row"><span class="lbl" id="reward">見積報酬</span><span class="val" id="reward2">—</span></div>
          <div class="result-row"><span class="lbl" id="multiplier">倍率</span><span class="val" id="multiplier2">—</span></div>
          <div class="result-row"><span class="lbl" id="sales">見積売上</span><span class="val" id="sales2">—</span></div>
          <div class="result-row"><span class="lbl" id="purchase">購入額</span><span class="val" id="purchase2">—</span></div>
          <div class="result-profit neutral" id="profit2" id="profit">利益: —</div>
        </div>
      </div>
    </section>

    <button class="reset-btn" id="resetBtn" id="reset">リセット</button>

  </main>

  <script type="module">
    import { HEIGHT_TABLE, TIME_TABLE, MATERIALS } from './data.js';

    const pieceState = {};
    MATERIALS.forEach(mat => {
      for (let i = 0; i < mat.qty; i++) pieceState[`${mat.id}_${i}`] = 'none';
    });

    function fmt(n) {
      return '¥' + n.toLocaleString('ja-JP');
    }

    function buildMaterials() {
      const grid = document.getElementById('materialsGrid');
      MATERIALS.forEach(mat => {
        const card = document.createElement('div');
        card.className = 'material-card';

        const img = document.createElement('img');
        img.src = `images/${mat.id}.webp`;
        img.alt = mat.name;
        card.appendChild(img);

        const nameEl = document.createElement('div');
        nameEl.className = 'material-name';
        nameEl.textContent = mat.name;
        card.appendChild(nameEl);

        const priceEl = document.createElement('div');
        priceEl.className = 'material-price';
        priceEl.textContent = fmt(mat.price) + ' / 個';
        card.appendChild(priceEl);

        const togglesEl = document.createElement('div');
        togglesEl.className = 'piece-toggles';

        for (let i = 0; i < mat.qty; i++) {
          const pieceId = `${mat.id}_${i}`;

          if (mat.qty > 1) {
            const lbl = document.createElement('div');
            lbl.className = 'piece-label';
            lbl.textContent = `${i + 1}個目`;
            togglesEl.appendChild(lbl);
          }

          const row = document.createElement('div');
          row.className = 'piece-toggle';
          row.dataset.piece = pieceId;

          [['1', 't1'], ['未', 'none'], ['2', 't2']].forEach(([label, val]) => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.dataset.val = val;
            if (val === 'none') btn.classList.add('active-none');
            btn.addEventListener('click', () => {
              pieceState[pieceId] = val;
              row.querySelectorAll('button').forEach(b => b.classList.remove('active-t1', 'active-none', 'active-t2'));
              btn.classList.add(`active-${val}`);
              calculate();
            });
            row.appendChild(btn);
          });

          togglesEl.appendChild(row);
        }

        card.appendChild(togglesEl);
        grid.appendChild(card);
      });
    }

    function validate(h1, h2, t) {
      if ([h1, h2, t].some(isNaN)) return null;
      if (h1 < 10 || h1 > 55) return '高さ1は10〜55の範囲で入力してください';
      if (h2 < 10 || h2 > 55) return '高さ2は10〜55の範囲で入力してください';
      if (t < 0 || t > 15)    return '時間は0〜15の範囲で入力してください';
      return '';
    }

    function calculate() {
      const h1 = parseInt(document.getElementById('height1').value);
      const h2 = parseInt(document.getElementById('height2').value);
      const t  = parseInt(document.getElementById('time').value);

      const err = validate(h1, h2, t);
      document.getElementById('errorMsg').textContent = err || '';

      if (err !== '') { clearResults(); return; }

      const reward1 = HEIGHT_TABLE[h1];
      const reward2 = HEIGHT_TABLE[h2];
      const mult    = TIME_TABLE[t];
      const sales1  = reward1 * mult;
      const sales2  = reward2 * mult;

      let purchase1 = 0, purchase2 = 0;
      MATERIALS.forEach(mat => {
        for (let i = 0; i < mat.qty; i++) {
          const s = pieceState[`${mat.id}_${i}`];
          if (s === 't1') purchase1 += mat.price;
          if (s === 't2') purchase2 += mat.price;
        }
      });

      document.getElementById('reward1').textContent    = fmt(reward1);
      document.getElementById('multiplier1').textContent = `×${mult}`;
      document.getElementById('sales1').textContent     = fmt(sales1);
      document.getElementById('purchase1').textContent  = fmt(purchase1);
      setProfit('profit1', sales1 - purchase1);

      document.getElementById('reward2').textContent    = fmt(reward2);
      document.getElementById('multiplier2').textContent = `×${mult}`;
      document.getElementById('sales2').textContent     = fmt(sales2);
      document.getElementById('purchase2').textContent  = fmt(purchase2);
      setProfit('profit2', sales2 - purchase2);
    }

    function setProfit(id, value) {
      const el = document.getElementById(id);
      el.textContent = `利益: ${fmt(value)}`;
      el.className = 'result-profit ' + (value > 0 ? 'positive' : value < 0 ? 'negative' : 'neutral');
    }

    function clearResults() {
      ['reward1','multiplier1','sales1','purchase1','reward2','multiplier2','sales2','purchase2']
        .forEach(id => { document.getElementById(id).textContent = '—'; });
      ['profit1','profit2'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '利益: —';
        el.className = 'result-profit neutral';
      });
    }

    function resetAll() {
      ['height1', 'height2', 'time'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('errorMsg').textContent = '';

      MATERIALS.forEach(mat => {
        for (let i = 0; i < mat.qty; i++) pieceState[`${mat.id}_${i}`] = 'none';
      });

      document.querySelectorAll('.piece-toggle button').forEach(btn => {
        btn.classList.remove('active-t1', 'active-none', 'active-t2');
        if (btn.dataset.val === 'none') btn.classList.add('active-none');
      });

      clearResults();
    }

    ['height1', 'height2', 'time'].forEach(id => {
      document.getElementById(id).addEventListener('input', calculate);
    });

    document.getElementById('resetBtn').addEventListener('click', resetAll);

    buildMaterials();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
